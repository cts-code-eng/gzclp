<style>

  padding-bottom: 90px; transition: padding-top .25s;
}
body.timer-on { padding-top: 62px; }

/* TIMER */
.timer-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: var(--card);

}
.timer-bar.on { display: block; }

.timer-skip { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 600; padding: 5px 12px; cursor: pointer; font-family: inherit; }
.timer-track { height: 3px; background: var(--border); }

.header { padding: 20px 20px 0; display: flex; align-items: flex-start; justify-content: space-between; }

.day-ex-row { padding: 11px 0; border-bottom: 1px solid var(--border); }
.day-ex-row:last-child { border-bottom: none; }

.set-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }

// ── STATE ─────────────────────────────────────────────────
function initExData(days) {
  const d = {};
  function init(id, tier) {
    const ex = EX[id]; if (!ex) return;
    if (!d[id]) d[id] = {};
    if (!d[id][tier]) {
      const w = ex.wt[tier] ?? ex.wt.t3 ?? 20;
      d[id][tier] = tier === 't3' ? { weight: w } : { weight: w, stage: 0 };
    }
  }
  days.forEach(day => {
    init(day.t1, 't1'); init(day.t2, 't2');
    day.t3s.forEach(id => init(id, 't3'));
  });
  return d;
}

function defaultState() {
  const days = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  return { initialized:false, name:'', units:'kg', sessionCount:0, days, exData:initExData(days), sessions:[], activeSession:null, view:'home' };
}

function migrateV2(old) {
  const s = defaultState();
  s.name = old.name || ''; s.units = old.units || 'kg'; s.sessionCount = old.sessionCount || 0;
  const l = old.lifts || {};
  const set = (id, tier, w, st) => { if (!s.exData[id]) s.exData[id] = {}; s.exData[id][tier] = { weight: w, stage: st||0 }; };
  if (l.squat?.t1Weight)    set('squat',    't1', l.squat.t1Weight,    l.squat.t1Stage);
  if (l.bench?.t1Weight)    set('bench',    't1', l.bench.t1Weight,    l.bench.t1Stage);
  if (l.bench?.t2Weight)    set('bench',    't2', l.bench.t2Weight,    l.bench.t2Stage);
  if (l.ohp?.t1Weight)      set('ohp',      't1', l.ohp.t1Weight,      l.ohp.t1Stage);
  if (l.ohp?.t2Weight)      set('ohp',      't2', l.ohp.t2Weight,      l.ohp.t2Stage);
  if (l.deadlift?.t2Weight) set('deadlift', 't2', l.deadlift.t2Weight, l.deadlift.t2Stage);
  const t3 = old.t3Exercises || {};
  Object.entries(t3).forEach(([id, d]) => { if (!s.exData[id]) s.exData[id] = {}; s.exData[id].t3 = { weight: d.weight||20 }; });
  s.sessions = (old.sessions||[]).map(sess => ({ ...sess, t3s: sess.t3 ? [{ exId: sess.t3.id||'latpulldown', name: sess.t3.name||'T3', weight: sess.t3.weight||20, lastReps: sess.t3.lastReps||null }] : [] }));
  s.initialized = old.initialized || false;
  return s;
}

let state = (() => {
  try {
    const v3 = localStorage.getItem('gzclp_v3');
    if (v3) return JSON.parse(v3);
    const v2 = localStorage.getItem('gzclp_v2');
    if (v2) return migrateV2(JSON.parse(v2));
  } catch {}
  return defaultState();
})();

function saveState() {
  localStorage.setItem('gzclp_v3', JSON.stringify(state));
  syncToCloud();
}

async function syncToCloud() {
  if (!sb || !currentUser) return;
  try {
    await sb.from('gzclp_data').upsert(
      { user_id: currentUser.id, data: JSON.parse(JSON.stringify(state)), updated_at: new Date().toISOString() },
      { onConflict: 'user_id' }
    );
  } catch(e) {}
}

async function loadFromCloud() {
  if (!sb || !currentUser) return;
  try {
    const { data, error } = await sb.from('gzclp_data')
      .select('data').eq('user_id', currentUser.id).single();
    if (error || !data) { syncToCloud(); return; }
    const cloud = data.data;
    if (cloud?.sessions?.length > 0) {
      state = cloud;
      localStorage.setItem('gzclp_v3', JSON.stringify(state));
      render();
    } else if (state.sessions?.length > 0) {
      await syncToCloud();
      showToast('Data backed up to cloud ☁️');
    }
  } catch(e) {}
}

async function initAuth() {
  if (!sb) { render(); return; }
  document.getElementById('app').innerHTML = '<div class="cloud-loading"><div class="spinner"></div><div>Loading…</div></div>';
  sb.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;
    if (event === 'INITIAL_SESSION') {
      if (!currentUser && !localStorage.getItem('gzclp_no_auth')) state.view = 'login';
      else if (currentUser) await loadFromCloud();
      render();
    } else if (event === 'SIGNED_IN') {
      await loadFromCloud();
      if (state.view === 'login') state.view = 'home';
      render();
    } else if (event === 'SIGNED_OUT') {
      state = defaultState();
      state.view = 'login';
      localStorage.removeItem('gzclp_no_auth');
      render();
    }
  });
}

// ── HELPERS ───────────────────────────────────────────────
function ensureExData(id, tier) {
  const ex = EX[id]; if (!ex) return;
  if (!state.exData[id]) state.exData[id] = {};
  if (!state.exData[id][tier]) {
    const w = ex.wt[tier] ?? ex.wt.t3 ?? 20;
    state.exData[id][tier] = tier === 't3' ? { weight: w } : { weight: w, stage: 0 };
  }
}
function snapWeight(w) { const s = state.units==='kg'?1.25:2.5; return Math.round(w/s)*s; }
function getInc(exId) { const ex = EX[exId]; return state.units==='kg' ? ex.incKg : ex.incLbs; }
function wLabel(exId, tier) {
  const ex = EX[exId]; const w = state.exData[exId]?.[tier]?.weight ?? 0;
  if (ex?.timeBased) return `${w}s`;
  if (ex?.bodyweight) return 'BW';
  return `${fmt(w)} ${state.units}`;
}
function fmt(w) { if (w===Math.floor(w)) return String(w); return w.toFixed(2).replace(/\.?0+$/,''); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PROGRESSION ───────────────────────────────────────────
function advanceFail(exId, tier) {
  ensureExData(exId, tier);
  const d = state.exData[exId][tier]; const ex = EX[exId];
  if (d.stage < 2) { d.stage++; }
  else {
    if (!ex?.bodyweight && !ex?.timeBased) d.weight = snapWeight(d.weight * 0.85);
    d.stage = 0;
  }
}

// ── SESSION ───────────────────────────────────────────────
function getCurrentDayIdx() { return state.sessionCount % 4; }

function buildSession() {
  const dayIdx = getCurrentDayIdx();
  const day = state.days[dayIdx];
  const label = 'ABCD'[dayIdx];
  ensureExData(day.t1,'t1'); ensureExData(day.t2,'t2');
  day.t3s.forEach(id => ensureExData(id,'t3'));
  const t1d = state.exData[day.t1].t1;
  const t2d = state.exData[day.t2].t2;
  const t1Stage = T1_STAGES[t1d.stage];
  const t2Stage = T2_STAGES[t2d.stage];
  return {
    workoutType: label,
    t1: { exId:day.t1, weight:t1d.weight, stageIdx:t1d.stage, stage:t1Stage, sets:Array(t1Stage.sets).fill(null) },
    t2: { exId:day.t2, weight:t2d.weight, stageIdx:t2d.stage, stage:t2Stage, sets:Array(t2Stage.sets).fill(null) },
    t3s: day.t3s.map(id => {
      const ex = EX[id]; const t3d = state.exData[id].t3;
      return { exId:id, name:ex?.name??id, weight:t3d.weight, timeBased:!!ex?.timeBased, bodyweight:!!ex?.bodyweight, sets:[null,null,null] };
    }),
  };
}

function startWorkout() { state.activeSession = buildSession(); state.view = 'workout'; saveState(); render(); }

function finishWorkout() {
  const s = state.activeSession; if (!s) return;
  // T1: pass = all non-amrap sets have reps >= required
  const t1Req = s.t1.stage.amrap ? s.t1.sets.slice(0,-1) : s.t1.sets;
  const t1Pass = t1Req.every(r => r !== null && r >= s.t1.stage.reps);
  ensureExData(s.t1.exId,'t1');
  if (t1Pass) { const d = state.exData[s.t1.exId].t1; if (!EX[s.t1.exId]?.bodyweight) d.weight = snapWeight(d.weight + getInc(s.t1.exId)); }
  else advanceFail(s.t1.exId,'t1');
  // T2: pass = all sets have reps >= required
  const t2Pass = s.t2.sets.every(r => r !== null && r >= s.t2.stage.reps);
  ensureExData(s.t2.exId,'t2');
  if (t2Pass) { const d = state.exData[s.t2.exId].t2; if (!EX[s.t2.exId]?.bodyweight) d.weight = snapWeight(d.weight + getInc(s.t2.exId)); }
  else advanceFail(s.t2.exId,'t2');
  // T3s: progress when last set (sets[2]) >= 25
  s.t3s.forEach(t3 => {
    const lastReps = t3.sets[2];
    if (lastReps !== null && lastReps >= 25) {
      ensureExData(t3.exId,'t3');
      const d = state.exData[t3.exId].t3; const ex = EX[t3.exId];
      if (ex?.timeBased) d.weight = Math.round((d.weight+5)/5)*5;
      else if (!ex?.bodyweight) d.weight = snapWeight(d.weight + getInc(t3.exId));
    }
  });
  // Snapshot records BEFORE unshift so we compare against previous sessions only
  const t1Rec  = snapshotRecords(s.t1.exId,  s.t1.weight,  s.t1.sets);
  const t2Rec  = snapshotRecords(s.t2.exId,  s.t2.weight,  s.t2.sets);
  const t3Recs = s.t3s.map(t3 => snapshotRecords(t3.exId, t3.weight, t3.sets));
  state.sessions.unshift({
    id:Date.now(), date:new Date().toISOString(), workoutType:s.workoutType,
    t1:{ exId:s.t1.exId, weight:s.t1.weight, stageLabel:s.t1.stage.label, passed:t1Pass, sets:[...s.t1.sets], records:t1Rec },
    t2:{ exId:s.t2.exId, weight:s.t2.weight, stageLabel:s.t2.stage.label, passed:t2Pass, sets:[...s.t2.sets], records:t2Rec },
    t3s:s.t3s.map((t3,i) => ({ exId:t3.exId, name:t3.name, weight:t3.weight, sets:[...t3.sets], lastReps:t3.sets[2]??null, records:t3Recs[i] })),
  });
  state.sessionCount++; state.activeSession = null; state.view = 'summary';
  stopTimer(); saveState(); render();
}

function discardWorkout() { state.activeSession=null; state.view='home'; stopTimer(); saveState(); render(); }

// ── TIMER ─────────────────────────────────────────────────
let timerIv=null, timerRem=0, timerTotal=0;
function startTimer(secs, label) {
  clearInterval(timerIv); timerRem=secs; timerTotal=secs;
  const bar=document.getElementById('timer-bar'), lbl=document.getElementById('timer-label');
  bar.classList.add('on'); document.body.classList.add('timer-on');
  lbl.textContent = label; updateTimerUI();
  timerIv = setInterval(() => {
    timerRem--;
    if (timerRem <= 0) { clearInterval(timerIv); timerIv=null; playBeep(); setTimeout(stopTimer,1500); updateTimerUI(); }
    else updateTimerUI();
  }, 1000);
}
function updateTimerUI() {
  const d=document.getElementById('timer-digits'), f=document.getElementById('timer-fill');
  if (!d) return;
  const m=Math.floor(timerRem/60), s=timerRem%60;
  d.textContent = `${m}:${String(s).padStart(2,'0')}`;
  f.style.width = `${Math.max(0,timerRem/timerTotal*100)}%`;
  const col = timerRem<=15?'var(--red)':timerRem<=60?'var(--orange)':'var(--green)';
  d.style.color=col; f.style.background=timerRem>15?'var(--accent)':col;
}
function stopTimer() {
  clearInterval(timerIv); timerIv=null;
  document.getElementById('timer-bar').classList.remove('on');
  document.body.classList.remove('timer-on');
}
function playBeep() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(t => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value=880;
      g.gain.setValueAtTime(.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.12);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.12);
    });
  } catch(e) {}
}

// ── RENDER ────────────────────────────────────────────────
let settingsDayIdx = 0;
let expandedSessionId = null;
let recordsExId = null;

function calc1RM(weight, reps) {
  if (!weight || reps <= 0) return null;
  if (reps === 1) return weight;
  if (reps < 10) return weight / (1.0278 - 0.0278 * reps); // Brzycki
  return weight * (1 + reps / 30); // Epley
}

function getExercisesWithHistory() {
  const seen = new Set();
  for (const s of state.sessions) {
    seen.add(s.t1.exId); seen.add(s.t2.exId);
    (s.t3s||[]).forEach(t => seen.add(t.exId));
  }
  return EXERCISES.filter(e => seen.has(e.id));
}

function getExerciseHistory(exId) {
  const rows = [];
  for (const s of state.sessions) {
    const d = new Date(s.date);
    if (s.t1.exId === exId) rows.push({ date:d, weight:s.t1.weight, sets:s.t1.sets||[], tier:'t1', workoutType:s.workoutType });
    if (s.t2.exId === exId) rows.push({ date:d, weight:s.t2.weight, sets:s.t2.sets||[], tier:'t2', workoutType:s.workoutType });
    (s.t3s||[]).forEach(t3 => { if (t3.exId===exId) rows.push({ date:d, weight:t3.weight, sets:t3.sets||[null,null,t3.lastReps??null], tier:'t3', workoutType:s.workoutType }); });
  }
  return rows; // newest first (sessions are unshifted)
}

function computeRecords(exId) {
  const ex = EX[exId]; const isTB = !!ex?.timeBased; const isBW = !!ex?.bodyweight;
  let r1=null,r1d=null,r1m='', rw=null,rwd=null,rwm='', rv=null,rvd=null,rvm='';
  for (const entry of getExerciseHistory(exId)) {
    const { weight, sets, date, tier } = entry;
    const valid = (sets||[]).filter(r=>r!==null&&r>0);
    if (!valid.length) continue;
    if (!isBW && !isTB) {
      if (rw===null||weight>rw) { rw=weight; rwd=date; rwm=tier.toUpperCase(); }
      for (const reps of valid) {
        const rm = calc1RM(weight, reps);
        if (rm&&(r1===null||rm>r1)) { r1=rm; r1d=date; r1m=`${reps<10?'Brzycki':'Epley'} · ${fmt(weight)} ${state.units} × ${reps}`; }
      }
      const vol = valid.reduce((a,r)=>a+weight*r, 0);
      if (vol&&(rv===null||vol>rv)) { rv=vol; rvd=date; rvm=`${valid.length} sets · ${valid.reduce((a,b)=>a+b,0)} reps @ ${fmt(weight)} ${state.units}`; }
    } else if (isTB) {
      const mx = Math.max(...valid);
      if (rw===null||mx>rw) { rw=mx; rwd=date; rwm=tier.toUpperCase(); }
    } else {
      const mx = Math.max(...valid);
      if (rw===null||mx>rw) { rw=mx; rwd=date; rwm=tier.toUpperCase(); }
      const tot = valid.reduce((a,b)=>a+b,0);
      if (rv===null||tot>rv) { rv=tot; rvd=date; rvm=`${valid.length} sets · ${tot} total reps`; }
    }
  }
  return { r1,r1d,r1m, rw,rwd,rwm, rv,rvd,rvm };
}

function render() {
  const app = document.getElementById('app');
  if (state.view === 'login') { app.innerHTML = renderLogin(); return; }
  if (!state.initialized) { app.innerHTML = renderSetup(); return; }
  const views = { home:renderHome, workout:renderWorkout, summary:renderSummary, history:renderHistory, records:renderRecords, settings:renderSettings };
  app.innerHTML = (views[state.view]||renderHome)() + (!['workout','summary'].includes(state.view) ? renderNav() : '');
}

function renderHome() {

function renderSessionRow(s, expandable=false) {

  const rowAction = expandable ? `data-action="toggle-session" data-sid="${s.id}"` : '';

function renderSessionDetail(s) {
  const dateVal = s.date ? s.date.slice(0,10) : '';

  const repsFromLabel = lbl => { const m=(lbl||'').match(/×(\d+)/); return m?parseInt(m[1]):1; };

  function setCircles(sets, tier, t3i) {
    if (!sets || !sets.length) return '<span style="color:var(--muted);font-size:12px">No sets recorded</span>';
    const stageReps = tier==='t1' ? repsFromLabel(s.t1.stageLabel)
                    : tier==='t2' ? repsFromLabel(s.t2.stageLabel) : 0;
    return sets.map((v, i) => {
      const isLastT12 = tier!=='t3' && i===sets.length-1;
      const label = isLastT12 ? 'AMRP' : i===2 && tier==='t3' ? 'AMRP' : `S${i+1}`;
      const target = tier==='t3' ? (i<2?15:25) : stageReps;
      const cls = v===null ? '' : tier==='t3'&&i===2 ? (v>=25?'hpass':v>0?'hpartial':'')
                : isLastT12 ? (v>0?'hpass':'') : v>=target?'hpass':'hfail';
      const sid = `data-hist-sid="${s.id}"`;
      const ref = tier==='t3' ? `data-hist-t3i="${t3i}" data-hist-setidx="${i}" data-hist-t3set`
                              : `data-hist-tier="${tier}" data-hist-setidx="${i}" data-hist-set`;
      return `<div class="hist-set"><span class="hist-set-lbl">${label}</span><input class="hist-set-inp ${cls}" type="number" min="0" value="${v??''}" placeholder="—" ${sid} ${ref}></div>`;
    }).join('');
  }

  function exBlock(tier, ex) {
    const exMeta = EX[ex.exId]; const isBW = !!exMeta?.bodyweight; const isTB = !!exMeta?.timeBased;
    const passed = ex.passed;
    const wUnit = isTB ? 's' : state.units;
    const wtInp = isBW ? `<span style="color:var(--muted);font-size:13px">Bodyweight</span>`
      : `<div class="hist-weight-wrap"><input class="hist-wt-inp" type="number" min="0" step="${isTB?5:0.25}" value="${isTB?ex.weight:fmt(ex.weight)}" data-hist-sid="${s.id}" data-hist-tier="${tier}" data-hist-wt><span style="font-size:12px;color:var(--muted)">${wUnit}</span></div>`;
    return `<div class="hist-block">
      <div class="hist-block-header">
        <span class="badge badge-${tier}">${tier.toUpperCase()}</span>
        <span class="hist-ex-name">${esc(exMeta?.name??ex.exId)}</span>
        ${wtInp}
        <span class="${passed?'rpass':'rfail'}" style="font-size:18px">${passed?'✓':'✗'}</span>
      </div>
      ${ex.stageLabel?`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">${esc(ex.stageLabel)}</div>`:''}
      <div class="hist-sets">${setCircles(ex.sets, tier, null)}</div>
      ${recBadgesHtml(ex.records)}
    </div>`;
  }

  const t3Blocks = (s.t3s||[]).map((t3, i) => {
    const exMeta = EX[t3.exId]; const isBW = !!exMeta?.bodyweight; const isTB = !!exMeta?.timeBased;
    const wUnit = isTB ? 's' : state.units;
    const wtInp = isBW ? `<span style="color:var(--muted);font-size:13px">Bodyweight</span>`
      : `<div class="hist-weight-wrap"><input class="hist-wt-inp" type="number" min="0" step="${isTB?5:0.25}" value="${isTB?t3.weight:fmt(t3.weight)}" data-hist-sid="${s.id}" data-hist-t3i="${i}" data-hist-t3wt><span style="font-size:12px;color:var(--muted)">${wUnit}</span></div>`;
    return `<div class="hist-block">
      <div class="hist-block-header">
        <span class="badge badge-t3">T3</span>
        <span class="hist-ex-name">${esc(t3.name)}</span>
        ${wtInp}
      </div>
      <div class="hist-sets">${setCircles(t3.sets||[null,null,t3.lastReps??null], 't3', i)}</div>
      ${recBadgesHtml(t3.records)}
    </div>`;
  }).join('');

  return `<div class="session-detail">
    <div class="hist-meta">
      <span class="hist-label">Date</span>
      <input class="hist-date-inp" type="date" value="${dateVal}" data-hist-sid="${s.id}" data-hist-date>
    </div>
    ${exBlock('t1', s.t1)}
    ${exBlock('t2', s.t2)}
    ${t3Blocks}
    <button class="hist-del-btn" data-action="delete-session" data-sid="${s.id}">Delete session</button>
  </div>`;
}

function renderWorkout() {
  const s = state.activeSession; if (!s) return renderHome();

  const doneCount = [s.t1,s.t2,...s.t3s].filter(ex=>ex.sets.every(x=>x!==null)).length;
  const progress = doneCount / (2 + s.t3s.length);

    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress*100}%"></div></div>
    ${renderExCard('t1',s)}${renderExCard('t2',s)}

    </div>

}

// Call BEFORE unshifting new session — compares against existing history only
function snapshotRecords(exId, weight, sets) {
  const ex = EX[exId];
  if (!exId || !weight || ex?.bodyweight || ex?.timeBased) return {};
  const valid = (sets||[]).filter(r => r !== null && r > 0);
  if (!valid.length) return {};
  const cur1RM = Math.max(...valid.map(r => calc1RM(weight, r)).filter(Boolean));
  const curVol = valid.reduce((a, r) => a + weight * r, 0);
  const hist = computeRecords(exId);
  return {
    rm1:    !!(cur1RM && cur1RM > (hist.r1 || 0)),
    weight: weight > (hist.rw || 0),
    volume: !!(curVol && curVol > (hist.rv || 0)),
  };
}

function recBadgesHtml(rec) {
  if (!rec) return '';
  const badges = [];
  if (rec.rm1)    badges.push('<span class="rec-badge">🏋️ New 1RM</span>');
  if (rec.weight) badges.push('<span class="rec-badge">👑 New Weight</span>');
  if (rec.volume) badges.push('<span class="rec-badge">💪 New Volume</span>');
  return badges.length ? `<div class="rec-badges">${badges.join('')}</div>` : '';
}

function computeWarmups(weight, exId) {
  const ex = EX[exId];
  if (!weight || ex?.bodyweight || ex?.timeBased) return [];
  const minWt = ex?.barbell ? (state.units === 'kg' ? 20 : 45) : 0;
  const snap = w => Math.max(minWt, Math.round(w / 5) * 5);
  return [
    { pct:40, reps:5, weight: snap(weight * 0.4) },
    { pct:60, reps:5, weight: snap(weight * 0.6) },
    { pct:80, reps:3, weight: snap(weight * 0.8) },
  ].filter(w => w.weight < weight);
}

function renderExCard(tier, session) {
  const ex = session[tier]; const exMeta = EX[ex.exId]; const stage = ex.stage;
  const isBW = !!exMeta?.bodyweight;
  const req = stage.amrap ? ex.sets.slice(0,-1) : ex.sets;
  const anyLogged = ex.sets.some(x=>x!==null);
  const allLogged = ex.sets.every(x=>x!==null);
  const allPass = anyLogged && req.every(r=>r!==null && r>=stage.reps);
  const sets = ex.sets.map((sv,i) => {
    const isAmrap = stage.amrap && i===ex.sets.length-1;
    const scheme = isAmrap ? 'amrap' : 'rep';
    const target = stage.reps; // amrap coloring uses scheme, not target; target used as pre-fill default
    const lbl = isAmrap ? 'AMRAP' : `S${i+1}`;
    const tgt = isAmrap ? 'reps+' : `/${stage.reps}`;
    const confirmed = sv!==null ? '1' : '0';
    const cls = sv===null ? '' : isAmrap ? (sv>0?'pass':'') : (sv>=stage.reps?'pass':'fail');
    return `<div class="set-wrap">
      <span class="set-lbl">${lbl}</span>
      <input class="set-inp ${cls}" type="number" min="0"
             data-setinput data-tier="${tier}" data-index="${i}"
             data-scheme="${scheme}" data-target="${target}" data-confirmed="${confirmed}"
             value="${sv!==null?sv:target}">
      <span class="set-tgt">${tgt}</span>
    </div>`;
  }).join('');
  return `<div class="exercise-card ${allLogged?'done':''}" data-ecard="${tier}">
    <div class="exercise-header"><div><div class="exercise-name">${esc(exMeta?.name??ex.exId)}</div><span class="badge badge-${tier}">${tier.toUpperCase()}</span></div>
      <span class="ex-result ${anyLogged?(allPass?'rpass':'rfail'):''}" style="font-size:22px">${anyLogged?(allPass?'✓':'✗'):''}</span>
    </div>
    ${isBW?`<div class="exercise-weight"><span>Bodyweight</span></div>`:`<div style="display:flex;align-items:baseline;gap:6px;margin:8px 0 2px"><input class="ex-weight-input" type="number" min="0" step="0.25" data-wtsession data-tier="${tier}" value="${fmt(ex.weight)}"><span style="font-size:15px;color:var(--muted);font-weight:500">${state.units}</span></div>`}
    ${(()=>{ const ws=computeWarmups(ex.weight,ex.exId); return ws.length?`<div class="warmup-section"><div class="warmup-hdr">Warm-up</div>${ws.map(w=>`<div class="warmup-row" data-action="toggle-warmup"><span class="warmup-pct">${w.pct}%</span><input class="warmup-inp" type="number" min="0" step="1" value="${fmt(w.weight)}" style="width:44px"><span class="warmup-unit">${state.units} ×</span><input class="warmup-inp" type="number" min="1" step="1" value="${w.reps}" style="width:28px"><span class="warmup-unit">reps</span><span class="warmup-tick">○</span></div>`).join('')}</div>`:''; })()}
    <div class="exercise-scheme">${stage.label} · tap to confirm · tap again to edit</div>
    <div class="sets-grid">${sets}</div>
  </div>`;
}

function renderT3Card(t3, idx) {
  const ex = EX[t3.exId]; const isTB = t3.timeBased; const isBW = t3.bodyweight;
  const allLogged = t3.sets.every(x=>x!==null);
  const lastReps = t3.sets[2];
  const scheme = isTB ? '15s · 15s · 25s+' : '15 · 15 · 25+';
  const progHTML = lastReps!==null
    ? `<div class="t3-progress" data-t3prog="${idx}">${lastReps>=25?`🔼 ${isTB?'Target time':'Weight'} will increase!`:`Need <b>${isTB?'25s':'25 reps'}</b> to progress · got ${lastReps}${isTB?'s':''}`}</div>`
    : `<div class="t3-progress" data-t3prog="${idx}" style="display:none"></div>`;
  const sets = [0,1,2].map(i => {
    const sv = t3.sets[i]; const isLast = i===2;
    const target = isLast ? 25 : 15;
    const scheme2 = isLast ? 't3amrap' : 'rep';
    const lbl = isLast ? (isTB?'MAX':'AMRAP') : `S${i+1}`;
    const tgt = isLast ? (isTB?'25s+':'25+') : (isTB?'15s':'15');
    const confirmed = sv!==null ? '1' : '0';
    const cls = sv===null ? '' : isLast ? (sv>=25?'pass':sv>0?'partial':'') : (sv>=target?'pass':'fail');
    return `<div class="set-wrap">
      <span class="set-lbl">${lbl}</span>
      <input class="set-inp ${cls}" type="number" min="0"
             data-t3setinput data-t3idx="${idx}" data-index="${i}"
             data-scheme="${scheme2}" data-target="${target}" data-confirmed="${confirmed}"
             value="${sv!==null?sv:target}">
      <span class="set-tgt">${tgt}</span>
    </div>`;
  }).join('');
  return `<div class="exercise-card ${allLogged?'done':''}" data-ecard="t3-${idx}">
    <div class="exercise-header"><div><div class="exercise-name">${esc(t3.name)}</div><span class="badge badge-t3">T3</span></div>
      <span class="ex-result" style="font-size:22px;color:var(--green)">${allLogged?'✓':''}</span>
    </div>
    ${isBW?`<div class="exercise-weight"><span>Bodyweight</span></div>`:`<div style="display:flex;align-items:baseline;gap:6px;margin:8px 0 2px"><input class="ex-weight-input" type="number" min="0" step="${isTB?5:0.25}" data-wtt3 data-t3idx="${idx}" value="${isTB?t3.weight:fmt(t3.weight)}"><span style="font-size:15px;color:var(--muted);font-weight:500">${isTB?'s':state.units}</span></div>`}
    <div class="exercise-scheme">${scheme} · 90s rest</div>
    <div class="sets-grid">${sets}</div>
    ${progHTML}
  </div>`;
}

function render1RMChart(exId) {
  const ex = EX[exId];
  if (ex?.timeBased || ex?.bodyweight) return '';

  // best e1RM per calendar date (multiple entries same day → take best)
  const byDate = new Map();
  for (const entry of getExerciseHistory(exId)) {
    const key = entry.date.toISOString().slice(0,10);
    const valid = (entry.sets||[]).filter(r=>r!==null&&r>0);
    if (!valid.length) continue;
    const best = Math.max(...valid.map(r=>calc1RM(entry.weight,r)).filter(Boolean));
    if (!best) continue;
    if (!byDate.has(key)||best>byDate.get(key).val) byDate.set(key,{date:entry.date,val:best});
  }
  const pts = [...byDate.values()].sort((a,b)=>a.date-b.date);
  if (!pts.length) return '';

  const W=400, H=150, pL=46, pR=12, pT=12, pB=28;
  const cW=W-pL-pR, cH=H-pT-pB;
  const vals=pts.map(p=>p.val);
  const rawMin=Math.min(...vals), rawMax=Math.max(...vals);
  const vpad=(rawMax-rawMin)*0.15||rawMax*0.08||5;
  const yMin=rawMin-vpad, yMax=rawMax+vpad, yRange=yMax-yMin;
  const tMin=pts[0].date.getTime(), tMax=pts[pts.length-1].date.getTime(), tRange=tMax-tMin||1;

  const px = d => pts.length===1 ? pL+cW/2 : pL+((d.getTime()-tMin)/tRange)*cW;
  const py = v => pT+cH-((v-yMin)/yRange)*cH;

  // y-axis gridlines + labels (5 lines)
  let yLines='';
  for(let i=0;i<=4;i++){
    const v=yMin+(yRange*i/4), yy=py(v);
    yLines+=`<line x1="${pL}" y1="${yy.toFixed(1)}" x2="${W-pR}" y2="${yy.toFixed(1)}" style="stroke:var(--border);stroke-width:1"/>`;
    yLines+=`<text x="${pL-5}" y="${(yy+3.5).toFixed(1)}" text-anchor="end" style="fill:var(--muted);font-size:9.5px;font-family:inherit">${fmt(v)}</text>`;
  }

  // x-axis date labels: first / mid / last
  const xIdxs = pts.length===1?[0]:pts.length===2?[0,1]:[0,Math.floor(pts.length/2),pts.length-1];
  const xLabels = xIdxs.map((i,li)=>{
    const p=pts[i], xx=px(p.date);
    const anchor = li===0?'start':li===xIdxs.length-1?'end':'middle';
    const lbl=p.date.toLocaleDateString('en',{day:'numeric',month:'short'});
    return `<text x="${xx.toFixed(1)}" y="${H-6}" text-anchor="${anchor}" style="fill:var(--muted);font-size:9.5px;font-family:inherit">${lbl}</text>`;
  }).join('');

  // path data
  const ptStr = pts.map(p=>`${px(p.date).toFixed(1)},${py(p.val).toFixed(1)}`).join(' ');
  const lastX = px(pts[pts.length-1].date).toFixed(1);
  const firstX = px(pts[0].date).toFixed(1);
  const baseY = (pT+cH).toFixed(1);
  const area = pts.length>1 ? `<polygon points="${firstX},${baseY} ${ptStr} ${lastX},${baseY}" style="fill:var(--accent);fill-opacity:.12"/>` : '';
  const line = pts.length>1 ? `<polyline points="${ptStr}" style="fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round"/>` : '';
  const dots = pts.map(p=>`<circle cx="${px(p.date).toFixed(1)}" cy="${py(p.val).toFixed(1)}" r="3.5" style="fill:var(--accent);stroke:var(--card2);stroke-width:1.5"/>`).join('');

  return `<div class="card" style="margin:10px 16px 0;padding:14px 12px 8px">
    <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px">Est. 1RM Progression · ${state.units}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">
      ${yLines}${area}${line}${dots}${xLabels}
    </svg>
  </div>`;
}

function renderRecords() {
  const exList = getExercisesWithHistory();
  if (!exList.length) return `<div class="page"><div class="header"><h1>Records</h1></div><div class="empty"><div style="font-size:44px;margin-bottom:14px">🏆</div><h3>No records yet</h3><p>Complete workouts to track records.</p></div></div>`;
  if (!recordsExId || !exList.find(e=>e.id===recordsExId)) recordsExId = exList[0].id;

  const ex = EX[recordsExId]; const isTB=!!ex?.timeBased; const isBW=!!ex?.bodyweight;
  const rec = computeRecords(recordsExId);
  const u = state.units;

  function fmtDate(d) { return d ? d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}) : ''; }
  function fmtVol(v) { return Math.round(v).toLocaleString(); }

  function card(label, value, unit, meta, date, full) {
    const cls = `rec-card${full?' full':''}`;
    if (value===null) return `<div class="${cls}"><div class="rec-card-label">${label}</div><div class="rec-card-value" style="font-size:22px;color:var(--muted)">—</div></div>`;
    return `<div class="${cls}">
      <div class="rec-card-label">${label}</div>
      <div class="rec-card-value">${typeof value==='number'&&!Number.isInteger(value)?fmt(value):fmtVol(value)}<span class="rec-card-unit"> ${unit}</span></div>
      <div class="rec-card-meta">${meta}<br><span style="font-size:10px">${fmtDate(date)}</span></div>
    </div>`;
  }

  const rm1Card   = card('Est. 1RM', isBW||isTB?null:rec.r1, u, rec.r1m, rec.r1d, false);
  const wtLabel   = isTB?'Best Duration':isBW?'Best Set (reps)':'Best Weight';
  const wtUnit    = isTB?'s':isBW?'reps':u;
  const wtCard    = card(wtLabel, rec.rw, wtUnit, rec.rwm, rec.rwd, false);
  const volLabel  = isBW?'Best Session (reps)':'Best Session Volume';
  const volUnit   = isBW?'reps':u;
  const volCard   = card(volLabel, isTB?null:rec.rv, volUnit, rec.rvm, rec.rvd, true);

  // History rows
  const histRows = getExerciseHistory(recordsExId).map(entry => {
    const { date, weight, sets, tier } = entry;
    const valid = (sets||[]).filter(r=>r!==null&&r>0);
    if (!valid.length) return '';
    const repsStr = (sets||[]).map(r=>r??'—').join(' · ');
    const best1RM = (!isBW&&!isTB) ? Math.max(...valid.map(r=>calc1RM(weight,r)).filter(Boolean)) : null;
    const vol     = (!isBW&&!isTB) ? valid.reduce((a,r)=>a+weight*r,0) : isBW ? valid.reduce((a,b)=>a+b,0) : null;
    const wtDisp  = isTB ? `${weight}s` : isBW ? 'BW' : `${fmt(weight)} ${u}`;
    return `<div class="rec-hist-row">
      <div class="rec-hist-datebox"><div class="day">${date.getDate()}</div><div class="mon">${date.toLocaleString('en',{month:'short'})}</div></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge badge-${tier}">${tier.toUpperCase()}</span>
          <span style="font-size:14px;font-weight:700">${wtDisp}</span>
          ${best1RM?`<span class="rec-hist-1rm" style="margin-left:auto">e1RM ${fmt(best1RM)} ${u}</span>`:''}
        </div>
        <div class="rec-hist-reps">${repsStr}${vol!==null?` · Vol ${isBW?vol:fmtVol(vol)} ${isBW?'reps':u}`:''}</div>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  const selOpts = exList.map(e=>`<option value="${e.id}" ${e.id===recordsExId?'selected':''}>${esc(e.name)}</option>`).join('');

  return `<div class="page">
    <div class="header"><h1>Records</h1></div>
    <div style="padding:12px 16px 0"><select class="records-sel" data-action="records-ex">${selOpts}</select></div>
    <div class="rec-cards">${rm1Card}${wtCard}${volCard}</div>
    ${render1RMChart(recordsExId)}
    ${histRows?`<div class="section-title">History</div><div class="card" style="margin-top:8px;padding:0 20px">${histRows}</div>`:''}
    <div style="height:16px"></div>
  </div>`;
}

function renderSummary() {
  const s = state.sessions[0];
  if (!s) return renderHome();

  const anyRec = r => r?.rm1 || r?.weight || r?.volume;
  const hasAnyRecord = anyRec(s.t1.records) || anyRec(s.t2.records) || (s.t3s||[]).some(t=>anyRec(t.records));

  function exBlock(tier, ex) {
    const exMeta = EX[ex.exId];
    const isBW = !!exMeta?.bodyweight; const isTB = !!exMeta?.timeBased;
    const wtDisp = isBW ? 'Bodyweight' : isTB ? `${ex.weight}s` : `${fmt(ex.weight)} ${state.units}`;
    const setsDisp = (ex.sets||[]).filter(r=>r!==null).join(' · ');
    return `<div class="summary-ex">
      <div class="summary-ex-header">
        <span class="badge badge-${tier}">${tier.toUpperCase()}</span>
        <span class="summary-ex-name">${esc(exMeta?.name??ex.exId)}</span>
        <span class="${ex.passed?'rpass':'rfail'}" style="font-size:18px">${ex.passed?'✓':'✗'}</span>
      </div>
      <div class="summary-ex-meta">${wtDisp}${ex.stageLabel?' · '+esc(ex.stageLabel):''}</div>
      ${setsDisp?`<div class="summary-ex-sets">${setsDisp}</div>`:''}
      ${recBadgesHtml(ex.records)}
    </div>`;
  }

  const t3Blocks = (s.t3s||[]).map(t3 => {
    const exMeta = EX[t3.exId];
    const isBW = !!exMeta?.bodyweight; const isTB = !!exMeta?.timeBased;
    const wtDisp = isBW ? 'Bodyweight' : isTB ? `${t3.weight}s` : `${fmt(t3.weight)} ${state.units}`;
    const setsDisp = (t3.sets||[]).filter(r=>r!==null).join(' · ');
    return `<div class="summary-ex">
      <div class="summary-ex-header">
        <span class="badge badge-t3">T3</span>
        <span class="summary-ex-name">${esc(t3.name)}</span>
      </div>
      <div class="summary-ex-meta">${wtDisp} · 15·15·25+</div>
      ${setsDisp?`<div class="summary-ex-sets">${setsDisp}</div>`:''}
      ${recBadgesHtml(t3.records)}
    </div>`;
  }).join('');

  return `<div class="page" style="padding-bottom:24px">
    <div class="summary-hero">
      <div class="summary-icon">${hasAnyRecord?'🏆':'✅'}</div>
      <h1 style="font-size:26px;font-weight:900;margin:0 0 4px">${hasAnyRecord?'New Records!':'Session Complete'}</h1>
      <div class="sub">Day ${s.workoutType} · Session ${state.sessionCount}</div>
    </div>
    <div style="padding:0 16px">
      ${exBlock('t1',s.t1)}
      ${exBlock('t2',s.t2)}
      ${t3Blocks}
    </div>
    <div style="padding:20px 16px 0">
      <button class="btn btn-primary" data-action="nav" data-view="home">Back to Home</button>
    </div>
  </div>`;
}

function renderHistory() {
  if (!state.sessions.length) return `<div class="page"><div class="header"><h1>History</h1></div><div class="empty"><div style="font-size:44px;margin-bottom:14px">📋</div><h3>No sessions yet</h3><p>Complete your first workout.</p></div></div>`;
  return `<div class="page"><div class="header"><div><h1>History</h1><div class="sub">${state.sessions.length} sessions</div></div></div><div class="card" style="margin-top:16px">${state.sessions.map(s=>renderSessionRow(s,true)).join('')}</div></div>`;
}

function renderSettings() {
  const day = state.days[settingsDayIdx];
  ensureExData(day.t1,'t1'); ensureExData(day.t2,'t2');
  day.t3s.forEach(id => ensureExData(id,'t3'));

  function exOptions(tier, selected) {
    const pool = (tier==='t3') ? EXERCISES : T12_EX;
    return pool.map(e=>`<option value="${e.id}" ${e.id===selected?'selected':''}>${esc(e.name)}</option>`).join('');
  }

  function adjRow(exId, tier, t3idx) {
    const ex = EX[exId]; const d = state.exData[exId]?.[tier];
    const isBW = !!ex?.bodyweight, isTB = !!ex?.timeBased;
    const w = d?.weight ?? 0;
    const dispW = isTB ? `${w}s` : isBW ? 'BW' : `${fmt(w)} ${state.units}`;
    const rawInc = isTB ? 5 : getInc(exId);
    const isTier12 = tier==='t1'||tier==='t2';
    const stageIdx = d?.stage ?? 0;
    const stages = tier==='t1' ? T1_STAGES : tier==='t2' ? T2_STAGES : null;
    const badgeHtml = isTier12
      ? `<span class="badge badge-${tier}">${tier.toUpperCase()}</span>`
      : `<span class="t3-sub-label">${t3idx+1}</span>`;
    const selData = isTier12
      ? `data-day="${settingsDayIdx}" data-slot="${tier}"`
      : `data-day="${settingsDayIdx}" data-slot="t3" data-t3idx="${t3idx}"`;
    return `<div class="day-ex-row">
      <div class="day-ex-top">
        ${badgeHtml}
        <select class="day-sel" data-action="day-sel" ${selData}>${exOptions(tier,exId)}</select>
        ${!isBW?`<div class="weight-adjuster"><button class="adj-btn" data-action="adj-ex" data-ex="${exId}" data-tier="${tier}" data-delta="${-rawInc}">−</button><input class="adj-weight-input" type="number" min="0" step="${isTB?5:0.25}" data-wtsetting data-ex="${exId}" data-tier="${tier}" value="${isTB?w:fmt(w)}"><span style="font-size:11px;color:var(--muted);margin-right:2px">${isTB?'s':state.units}</span><button class="adj-btn" data-action="adj-ex" data-ex="${exId}" data-tier="${tier}" data-delta="${rawInc}">+</button></div>`:`<span style="color:var(--muted);font-size:12px;margin-left:4px">Bodyweight</span>`}
      </div>
      ${stages?`<div class="stage-pills" style="padding-left:${isTier12?'36px':'24px'};margin-top:7px">${stages.map((s,i)=>`<button class="stage-pill ${i===stageIdx?'active':''}" data-action="set-stage" data-ex="${exId}" data-tier="${tier}" data-stage="${i}">${s.label}</button>`).join('')}</div>`:''}
    </div>`;
  }

  return `<div class="page">
    <div class="header"><h1>Settings</h1></div>
    <div class="day-tabs">${['A','B','C','D'].map((l,i)=>`<button class="day-tab ${i===settingsDayIdx?'active':''}" data-action="settings-day" data-day="${i}">Day ${l}</button>`).join('')}</div>
    <div class="card" style="margin-top:12px">
      ${adjRow(day.t1,'t1',null)}
      ${adjRow(day.t2,'t2',null)}
      <div class="t3-section-head">T3 · 15 · 15 · 25+</div>
      ${day.t3s.map((id,i)=>adjRow(id,'t3',i)).join('')}
    </div>
    <div class="section-title">Preferences</div>
    <div class="card" style="margin-top:8px">
      <div class="settings-row"><div class="settings-label">Units</div><div class="toggle-row" style="width:120px"><button class="toggle-btn ${state.units==='kg'?'active':''}" data-action="set-units" data-units="kg">kg</button><button class="toggle-btn ${state.units==='lbs'?'active':''}" data-action="set-units" data-units="lbs">lbs</button></div></div>
      <div class="settings-row"><div class="settings-label">Name</div><input class="input" id="settings-name" value="${esc(state.name)}" placeholder="Athlete" style="width:150px;padding:8px 12px"></div>
    </div>
    <div class="section-title">Data</div>
    <div class="card" style="margin-top:8px">
      ${sb ? `<div class="settings-row"><div><div class="settings-label">Cloud Sync</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${currentUser?`Signed in as ${esc(currentUser.email)}`:'Not signed in'}</div></div>${currentUser?`<button class="btn btn-secondary" style="width:auto;padding:8px 14px;font-size:13px" data-action="sign-out">Sign Out</button>`:`<button class="btn btn-primary" style="width:auto;padding:8px 14px;font-size:13px" data-action="go-login">Sign In</button>`}</div>` : ''}
      <div class="settings-row"><div class="settings-label">Export JSON</div><button class="btn btn-secondary" style="width:auto;padding:8px 14px;font-size:13px" data-action="export-data">Download</button></div>
      <div class="settings-row"><div class="settings-label">Import JSON</div><label style="cursor:pointer"><span class="btn btn-secondary" style="display:inline-block;padding:8px 14px;font-size:13px;width:auto;cursor:pointer">Import</span><input type="file" accept=".json" id="import-file-input" style="display:none"></label></div>
    </div>
    <div style="padding:16px;margin-top:8px"><button class="btn btn-danger" data-action="confirm-reset">Reset all data</button></div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────
document.getElementById('timer-skip').addEventListener('click', stopTimer);

document.addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const a = btn.dataset.action;
  if (a==='nav')         { state.view=btn.dataset.view; saveState(); render(); return; }
  if (a==='set-units')   { state.units=btn.dataset.units; saveState(); render(); return; }
  if (a==='settings-day'){ settingsDayIdx=parseInt(btn.dataset.day); render(); return; }

  if (a==='complete-setup') {
    state.name = (document.getElementById('sn')?.value||'').trim();
    const g=(id,def)=>{const v=parseFloat(document.getElementById(id)?.value);return isNaN(v)||v<=0?def:v;};
    const kg=state.units==='kg';
    const set=(eid,tier,v)=>{if(!state.exData[eid])state.exData[eid]={};state.exData[eid][tier]={weight:v,stage:0};};
    set('squat',   't1', g('sw-squat-t1',    kg?60:135));
    set('bench',   't1', g('sw-bench-t1',    kg?40:95));
    set('bench',   't2', g('sw-bench-t2',    kg?32:75));
    set('ohp',     't1', g('sw-ohp-t1',      kg?30:65));
    set('ohp',     't2', g('sw-ohp-t2',      kg?25:55));
    set('deadlift','t2', g('sw-deadlift-t2', kg?60:135));
    state.initialized=true; state.view='home'; saveState(); render(); return;
  }

  if (a==='toggle-warmup') {
    if (e.target.tagName === 'INPUT') return;
    btn.classList.toggle('done');
    const tick = btn.querySelector('.warmup-tick');
    if (tick) tick.textContent = btn.classList.contains('done') ? '✓' : '○';
    return;
  }

  if (a==='toggle-session') {
    const sid = parseInt(btn.dataset.sid);
    expandedSessionId = expandedSessionId === sid ? null : sid;
    render(); return;
  }
  if (a==='delete-session') {
    if (!confirm('Delete this session? This cannot be undone.')) return;
    const sid = parseInt(btn.dataset.sid);
    state.sessions = state.sessions.filter(s => s.id !== sid);
    if (expandedSessionId === sid) expandedSessionId = null;
    saveState(); render(); return;
  }

  if (a==='start-workout')   { startWorkout(); return; }
  if (a==='resume-workout')  { state.view='workout'; saveState(); render(); return; }
  if (a==='finish-workout')  { finishWorkout(); return; }
  if (a==='discard-workout') {
    if (state.activeSession && !confirm('Abandon this workout? Progress will be lost.')) return;
    discardWorkout(); return;
  }

  // toggle-set and toggle-t3set removed — reps handled via input events

  if (a==='adj-ex') {
    const { ex:exId, tier, delta } = btn.dataset;
    ensureExData(exId, tier);
    const d = state.exData[exId][tier];
    const parsed = parseFloat(delta);
    const ex = EX[exId];
    if (ex?.timeBased) d.weight = Math.max(0, Math.round((d.weight+parsed)/5)*5);
    else if (!ex?.bodyweight) d.weight = Math.max(0, snapWeight(d.weight+parsed));
    saveState(); render(); return;
  }

  if (a==='set-stage') {
    const { ex:exId, tier, stage } = btn.dataset;
    ensureExData(exId, tier);
    state.exData[exId][tier].stage = parseInt(stage);
    saveState(); render(); return;
  }

  if (a==='confirm-reset') {
    if (confirm('Reset all training data? This cannot be undone.')) { state=defaultState(); saveState(); render(); }
    return;
  }

  if (a==='auth-submit') {
    const email = (document.getElementById('auth-email')?.value||'').trim();
    const pw    = document.getElementById('auth-pw')?.value||'';
    const errEl = document.getElementById('auth-err');
    const authBtn = document.getElementById('auth-btn');
    if (!email||!pw) { if(errEl){errEl.style.color='var(--red)';errEl.textContent='Please enter your email and password.';} return; }
    if (authBtn) { authBtn.disabled=true; authBtn.textContent=loginMode==='register'?'Creating…':'Signing in…'; }
    try {
      let res;
      if (loginMode==='register') res = await sb.auth.signUp({ email, password:pw });
      else res = await sb.auth.signInWithPassword({ email, password:pw });
      if (res.error) {
        if (errEl) { errEl.style.color='var(--red)'; errEl.textContent=res.error.message; }
        if (authBtn) { authBtn.disabled=false; authBtn.textContent=loginMode==='register'?'Create Account':'Sign In'; }
      } else if (loginMode==='register' && !res.data.session) {
        if (errEl) { errEl.style.color='var(--green)'; errEl.textContent='Account created! Check your email to confirm, then sign in.'; }
        loginMode='login';
        if (authBtn) { authBtn.disabled=false; authBtn.textContent='Sign In'; }
      }
    } catch(err) {
      if (errEl) { errEl.style.color='var(--red)'; errEl.textContent='Network error. Please try again.'; }
      if (authBtn) { authBtn.disabled=false; authBtn.textContent=loginMode==='register'?'Create Account':'Sign In'; }
    }
    return;
  }

  if (a==='auth-toggle') { loginMode=loginMode==='login'?'register':'login'; render(); return; }

  if (a==='auth-skip') {
    localStorage.setItem('gzclp_no_auth','1');
    state.view='home'; render(); return;
  }

  if (a==='sign-out') {
    if (confirm('Sign out? Your data stays on this device.')) await sb.auth.signOut();
    return;
  }

  if (a==='go-login') { state.view='login'; render(); return; }

  if (a==='export-data') {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href=url; link.download=`gzclp-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showToast('Data exported ✓');
    return;
  }
});

document.addEventListener('change', e => {
  const el = e.target;
  if (el.id === 'import-file-input') {
    const file = el.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.days || !Array.isArray(imported.sessions)) { showToast('Invalid backup file'); return; }
        state = imported; saveState(); render();
        showToast('Data imported ✓');
      } catch(e) { showToast('Could not read file'); }
    };
    reader.readAsText(file); return;
  }
  if (el.dataset.action === 'records-ex') { recordsExId = el.value; render(); return; }
  if (el.dataset.action !== 'day-sel') return;
  const dayIdx=parseInt(el.dataset.day), slot=el.dataset.slot, val=el.value;
  if (slot==='t1') { state.days[dayIdx].t1=val; ensureExData(val,'t1'); }
  else if (slot==='t2') { state.days[dayIdx].t2=val; ensureExData(val,'t2'); }
  else if (slot==='t3') { state.days[dayIdx].t3s[parseInt(el.dataset.t3idx)]=val; ensureExData(val,'t3'); }
  saveState(); render();
});

// ── DOM helpers (no re-render) ────────────────────────────
function colorSetInput(el) {
  if (el.dataset.confirmed === '0') return;
  const val = el.value==='' ? null : parseInt(el.value);
  el.classList.remove('pass','fail','partial');
  if (val===null) return;
  const scheme = el.dataset.scheme, target = parseInt(el.dataset.target||0);
  if (scheme==='rep')     { el.classList.add(val>=target ? 'pass' : 'fail'); }
  else if (scheme==='amrap')   { if (val>0) el.classList.add('pass'); }
  else if (scheme==='t3amrap') { el.classList.add(val>=25?'pass':val>0?'partial':''); }
}

function refreshCardResult(cardEl) {
  if (!cardEl) return;
  const repInputs = Array.from(cardEl.querySelectorAll('[data-scheme="rep"][data-confirmed="1"]'));
  const allInputs  = Array.from(cardEl.querySelectorAll('input[data-scheme][data-confirmed="1"]'));
  const anyLogged  = allInputs.length > 0;
  const allRepPass = repInputs.length>0 && repInputs.every(i=>parseInt(i.value)>=parseInt(i.dataset.target));
  const res = cardEl.querySelector('.ex-result'); if (!res) return;
  res.textContent = anyLogged ? (allRepPass?'✓':'✗') : '';
  res.className = `ex-result ${anyLogged?(allRepPass?'rpass':'rfail'):''}`;
  res.style.fontSize = '22px';
}

function updateFinishBtns() {
  const s = state.activeSession; if (!s) return;
  const hasAny = s.t1.sets.some(x=>x!==null)||s.t2.sets.some(x=>x!==null)||s.t3s.some(t3=>t3.sets.some(x=>x!==null));
  document.querySelectorAll('[data-action="finish-workout"]').forEach(b=>b.style.display=hasAny?'':'none');
}

document.addEventListener('pointerdown', e => {
  const el = e.target;
  if (!state.activeSession) return;
  if (!('setinput' in el.dataset || 't3setinput' in el.dataset)) return;
  if (el.dataset.confirmed !== '0') return;
  e.preventDefault(); // prevent keyboard on first tap
  el.dataset.confirmed = '1';
  const val = parseInt(el.value); // pre-filled with target

  if ('setinput' in el.dataset) {
    const tier = el.dataset.tier, idx = parseInt(el.dataset.index);
    state.activeSession[tier].sets[idx] = val; saveState();
    colorSetInput(el);
    startTimer(REST[tier], `${tier.toUpperCase()} rest · ${tier==='t1'?'3 min':'2 min'}`);
    refreshCardResult(el.closest('[data-ecard]'));
    const card = el.closest('.exercise-card');
    if (card) card.classList.toggle('done', state.activeSession[tier].sets.every(x=>x!==null));
  } else {
    const t3idx = parseInt(el.dataset.t3idx), setIdx = parseInt(el.dataset.index);
    const t3 = state.activeSession.t3s[t3idx];
    t3.sets[setIdx] = val; saveState();
    colorSetInput(el);
    startTimer(REST.t3, 'T3 rest · 90s');
    const card = el.closest('[data-ecard]');
    if (card) {
      card.classList.toggle('done', t3.sets.every(x=>x!==null));
      const res = card.querySelector('.ex-result');
      if (res) res.textContent = t3.sets.every(x=>x!==null) ? '✓' : '';
    }
    if (setIdx === 2) {
      const prog = document.querySelector(`[data-t3prog="${t3idx}"]`);
      if (prog) {
        const isTB = t3.timeBased; prog.style.display = '';
        prog.innerHTML = val>=25 ? `🔼 ${isTB?'Target time':'Weight'} will increase!`
          : `Need <b>${isTB?'25s':'25 reps'}</b> to progress · got ${val}${isTB?'s':''}`;
      }
    }
  }
  updateFinishBtns();
});

document.addEventListener('input', e => {
  const el = e.target;
  if (el.id==='settings-name') { state.name=el.value.trim(); saveState(); }

  // Set rep entry (T1 / T2)
  if ('setinput' in el.dataset && state.activeSession) {
    const tier=el.dataset.tier, idx=parseInt(el.dataset.index);
    const prev=state.activeSession[tier].sets[idx];
    const val=el.value===''?null:Math.max(0,parseInt(el.value)||0);
    state.activeSession[tier].sets[idx]=val; saveState();
    colorSetInput(el);
    if (prev===null && val!==null) startTimer(REST[tier],`${tier.toUpperCase()} rest · ${tier==='t1'?'3 min':'2 min'}`);
    refreshCardResult(el.closest('[data-ecard]'));
    updateFinishBtns();
    // keep card dimming in sync
    const card=el.closest('.exercise-card');
    if (card) card.classList.toggle('done', state.activeSession[tier].sets.every(x=>x!==null));
    return;
  }

  // Set rep entry (T3)
  if ('t3setinput' in el.dataset && state.activeSession) {
    const t3idx=parseInt(el.dataset.t3idx), setIdx=parseInt(el.dataset.index);
    const t3=state.activeSession.t3s[t3idx];
    const prev=t3.sets[setIdx];
    const val=el.value===''?null:Math.max(0,parseInt(el.value)||0);
    t3.sets[setIdx]=val; saveState();
    colorSetInput(el);
    if (prev===null && val!==null) startTimer(REST.t3,'T3 rest · 90s');
    // result indicator
    const card=el.closest('[data-ecard]');
    if (card) {
      card.classList.toggle('done', t3.sets.every(x=>x!==null));
      const res=card.querySelector('.ex-result');
      if (res) res.textContent=t3.sets.every(x=>x!==null)?'✓':'';
    }
    // progression indicator for last set
    if (setIdx===2) {
      const prog=document.querySelector(`[data-t3prog="${t3idx}"]`);
      if (prog) {
        if (val===null) { prog.style.display='none'; prog.innerHTML=''; }
        else {
          const isTB=t3.timeBased;
          prog.style.display='';
          prog.innerHTML=val>=25?`🔼 ${isTB?'Target time':'Weight'} will increase!`:`Need <b>${isTB?'25s':'25 reps'}</b> to progress · got ${val}${isTB?'s':''}`;
        }
      }
    }
    updateFinishBtns();
    return;
  }

  // Direct weight entry — save without re-render so focus is preserved
  if ('wtsession' in el.dataset && state.activeSession) {
    const val = parseFloat(el.value);
    if (!isNaN(val) && val >= 0) {
      const tier = el.dataset.tier;
      state.activeSession[tier].weight = val;
      ensureExData(state.activeSession[tier].exId, tier);
      state.exData[state.activeSession[tier].exId][tier].weight = val;
      saveState();
    }
  }
  if ('wtt3' in el.dataset && state.activeSession) {
    const val = parseFloat(el.value);
    if (!isNaN(val) && val >= 0) {
      const t3 = state.activeSession.t3s[parseInt(el.dataset.t3idx)];
      t3.weight = val;
      ensureExData(t3.exId, 't3');
      state.exData[t3.exId].t3.weight = val;
      saveState();
    }
  }
  if ('wtsetting' in el.dataset) {
    const val = parseFloat(el.value);
    if (!isNaN(val) && val >= 0) {
      const { ex: exId, tier } = el.dataset;
      ensureExData(exId, tier);
      state.exData[exId][tier].weight = val;
      saveState();
    }
  }

  // ── History editing ────────────────────────────────────────
  if ('histSid' in el.dataset) {
    const sid = parseInt(el.dataset.histSid);
    const sess = state.sessions.find(s => s.id === sid);
    if (!sess) return;

    if ('histDate' in el.dataset && el.value) {
      const existing = new Date(sess.date);
      const [y,m,d] = el.value.split('-').map(Number);
      existing.setFullYear(y); existing.setMonth(m-1); existing.setDate(d);
      sess.date = existing.toISOString();
      saveState(); return;
    }

    if ('histWt' in el.dataset) {
      const val = parseFloat(el.value);
      if (!isNaN(val) && val >= 0) { sess[el.dataset.histTier].weight = val; saveState(); }
      return;
    }

    if ('histT3wt' in el.dataset) {
      const val = parseFloat(el.value);
      if (!isNaN(val) && val >= 0) { sess.t3s[parseInt(el.dataset.histT3i)].weight = val; saveState(); }
      return;
    }

    if ('histSet' in el.dataset) {
      const tier = el.dataset.histTier, idx = parseInt(el.dataset.histSetidx);
      const val = el.value === '' ? null : Math.max(0, parseInt(el.value)||0);
      if (!sess[tier].sets) sess[tier].sets = [];
      sess[tier].sets[idx] = val;
      // recompute passed
      const ex = sess[tier]; const label = ex.stageLabel||'';
      const req = label.includes('×3')?3:label.includes('×10')?10:label.includes('×8')?8:label.includes('×6')?6:label.includes('×2')?2:1;
      const nonAmrap = ex.sets.slice(0, -1);
      ex.passed = nonAmrap.every(r => r !== null && r >= req);
      saveState();
      el.classList.remove('hpass','hfail','hpartial');
      if (val !== null) el.classList.add(val >= req ? 'hpass' : 'hfail');
      return;
    }

    if ('histT3set' in el.dataset) {
      const t3i = parseInt(el.dataset.histT3i), idx = parseInt(el.dataset.histSetidx);
      const val = el.value === '' ? null : Math.max(0, parseInt(el.value)||0);
      const t3 = sess.t3s[t3i];
      if (!t3.sets) t3.sets = [null, null, null];
      t3.sets[idx] = val;
      if (idx === 2) t3.lastReps = val;
      saveState();
      el.classList.remove('hpass','hfail','hpartial');
      if (val !== null) {
        if (idx === 2) el.classList.add(val>=25?'hpass':val>0?'hpartial':'');
        else el.classList.add(val>=15?'hpass':'hfail');
      }
      return;
    }
  }
});

// ── TOAST ─────────────────────────────────────────────────
let toastTm;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTm); toastTm=setTimeout(()=>t.classList.remove('show'),3500);
}

// ── BOOT ──────────────────────────────────────────────────
initAuth();
</script>
</body>
</html>
